# ============================================================
#  Kitty Terminal Configuration
#  Theme: Tokyo Night Storm | Font: FiraCode Nerd Font
#  Style: Modern Glassmorphism
#  Updated: 2026-04-28
# ============================================================

# --- 主题 ---
include themes/tokyo_night_storm.conf

# --- 字体 ---
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0
disable_ligatures cursor
symbol_map U+E000-U+F8FF,U+F0000-U+10FFFF FiraCode Nerd Font

# --- 窗口 (毛玻璃效果) ---
window_padding_width 16
window_padding_height 8
window_border_width 0.5pt
window_margin_width 0
background_opacity 0.4
background_blur 80
dynamic_background_opacity yes
confirm_os_window_close 2

# --- 光标 ---
cursor_shape beam
cursor_beam_thickness 1.5
cursor_blink_interval 0
cursor_shape_unfocused hollow
cursor_stop_blink_after 15.0

# --- Tab 栏 (底部 Powerline) ---
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template " {index}: {title} "
active_tab_font_style bold
tab_bar_min_tabs 1

# --- 性能 (Apple Silicon Metal) ---
repaint_delay 3
input_delay 1
sync_to_monitor yes
opengl_backend auto

# --- Shell 集成 ---
# 禁用 (zsh-autopair/zle 兼容性问题)
shell_integration disabled

# --- macOS 专属 ---
macos_titlebar_color background
macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_window_toolbar_color background
macos_thicken_font 0.5

# --- URL 检测 ---
url_style curly
open_url_with default

# --- 鼠标 ---
mouse_hide_wait 3.0
url_color #7aa2f7
strip_trailing_spaces smart

# --- 窗口状态记忆 ---
remember_window_size yes
initial_window_width 140c
initial_window_height 40c

# --- 键绑定: 标签管理 ---
map cmd+t new_tab
map cmd+w close_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+shift+] move_tab_forward
map cmd+shift+[ move_tab_backward

# --- 键绑定: 窗口管理 ---
map cmd+n new_os_window
map cmd+enter toggle_fullscreen
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
# 分屏导航: Ctrl+hjkl
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
# 分屏大小调整: Ctrl+Shift+HJKL
map ctrl+shift+h neighboring_window left --resize 5
map ctrl+shift+j neighboring_window down --resize 5
map ctrl+shift+k neighboring_window up --resize 5
map ctrl+shift+l neighboring_window right --resize 5

# --- 键绑定: 复制粘贴 ---
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map selection copy_to_clipboard

# --- 键绑定: 字体缩放 ---
map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

# --- 键绑定: 透明度调节 ---
map cmd+shift+a>m set_background_opacity +0.05
map cmd+shift+a>l set_background_opacity -0.05
map cmd+shift+a>d set_background_opacity default

# --- 键绑定: 配置 ---
map cmd+comma kitten edit-config-file
map cmd+shift+comma load_config_file

# --- 键绑定: 快速工具启动 ---
map cmd+shift+f launch --type=overlay --title=fzf sh -c 'fzf --preview "bat --color=always {}" | xargs -I{} echo {}'
map cmd+shift+g launch --cwd=current lazygit
map cmd+shift+j launch --cwd=current joshuto
map cmd+shift+b launch --type=overlay --title=btop btop
