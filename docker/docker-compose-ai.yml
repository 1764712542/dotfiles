# ── AI 服务 Docker Compose ──
# 使用: docker compose -f docker-compose-ai.yml up -d
# 前置条件: colima start

services:
  # Ollama - 本地 LLM 推理
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    platform: linux/arm64

  # ChromaDB - 向量数据库
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # Qdrant - 高性能向量数据库（备选）
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # PGVector - PostgreSQL 向量扩展（备选）
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ai
      - POSTGRES_PASSWORD=${PG_PASSWORD:-ai}
      - POSTGRES_DB=ai
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
  qdrant_data:
  pgvector_data:
